    fields:
      showreel_url:
        label: Showreel embed URL
        type: url
        required: true
        help: "A Vimeo or YouTube URL. Rendered as a full-bleed, chrome-free background video (autoplay, loop, muted) - see the front-end for the current rough implementation."
      logo:
        label: Main logo
        type: files
        layout: cards
        max: 1
        query: page.images
      info:
        type: info
        text: "The About link and the scroll-to-portfolio link are structural (part of the template), not editable content."

  - width: 1/1
    sections:
      pages:
        label: Pages
        type: pages
        layout: list
