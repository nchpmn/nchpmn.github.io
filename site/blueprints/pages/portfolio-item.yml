title: Portfolio item

columns:
  - width: 1/1
    fields:
      headline:
        label: Title
        type: text
        required: true
      date:
        label: Date
        type: date
        required: true
        help: Full date is stored; displayed as "Month, Year" on the site.
      blurb:
        label: Blurb
        type: textarea
        size: small
        required: true
      featured_media_type:
        label: Featured media type
        type: select
        options:
          video: Video
          photo: Photo
        default: photo
      featured_video_url:
        label: Featured video URL
        type: url
        help: Used when featured media type is Video (Vimeo/YouTube embed).
        when:
          featured_media_type: video
      featured_photo:
        label: Featured photo
        type: files
        layout: cards
        max: 1
        query: page.images
        when:
          featured_media_type: photo
      thumbnail:
        label: Thumbnail
        type: files
        layout: cards
        max: 1
        query: page.images
        help: Used in the portfolio grid (hover reveals title + date over this image).
      main_content:
        label: Main content
        type: blocks
