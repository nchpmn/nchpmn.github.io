title: Article

columns:
  - width: 1/1
    fields:
      headline:
        label: Title
        type: text
        required: true
      date:
        label: Date
        type: date
        required: true
        help: Full date is stored; displayed as "Month, Year" on the site.
      blurb:
        label: Blurb
        type: textarea
        size: small
        required: true
      thumbnail:
        label: Thumbnail
        type: files
        layout: cards
        max: 1
        query: page.images
      main_content:
        label: Article text
        type: blocks
