title: Site settings

tabs:
  content:
    label: Pages
    icon: home
    sections:
      pages:
        type: pages
        layout: list

  footer:
    label: Footer
    icon: bars
    fields:
      footer_text:
        label: Footer text
        type: textarea
        size: small
        help: Shown in the footer on every page, both sites.
      copyright_text:
        label: Copyright text
        type: text
        help: "e.g. © 2026 Nathan Chapman"
      footer_links:
        label: Footer links
        type: structure
        help: "Links shown in the footer, both sites (TBC - fill in once decided)"
        fields:
          label:
            label: Label
            type: text
            required: true
          url:
            label: URL
            type: url
            required: true
